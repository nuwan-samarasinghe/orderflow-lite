spring.application.name=orderflow-lite
# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/orderflow_lite
spring.datasource.username=app_user
spring.datasource.password=app_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Seed data on startup
app.seed.enabled=true
app.seed.mode=latest-per-entity
app.seed.classpath-location=seed-data
app.seed.external-location=./seed-data