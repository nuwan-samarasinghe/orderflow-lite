<section>
      <div class="page-header">
        <div>
          <h1>Products</h1>
        </div>
      </div>

      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Search products</mat-label>
        <input
          matInput
          [formControl]="searchControl"
          placeholder="Search by name or SKU"
        />
      </mat-form-field>

      @if (loading()) {
        <mat-progress-spinner mode="indeterminate" diameter="36" />
      } @else {
        <table
          mat-table
          [dataSource]="products()"
          matSort
          (matSortChange)="onSortChange($event)"
        >
          <ng-container matColumnDef="sku">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="sku">SKU</th>
            <td mat-cell *matCellDef="let product">{{ product.sku }}</td>
          </ng-container>

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="name">Name</th>
            <td mat-cell *matCellDef="let product">{{ product.name }}</td>
          </ng-container>

          <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="category">Category</th>
            <td mat-cell *matCellDef="let product">{{ product.category || "-" }}</td>
          </ng-container>

          <ng-container matColumnDef="price">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="price">Price</th>
            <td mat-cell *matCellDef="let product">{{ product.price | currency }}</td>
          </ng-container>

          <ng-container matColumnDef="availableQuantity">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="availableQuantity">Qty</th>
            <td mat-cell *matCellDef="let product">{{ product.availableQuantity ?? 0 }}</td>
          </ng-container>

          <ng-container matColumnDef="active">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="active">Active</th>
            <td mat-cell *matCellDef="let product">
              {{ product.active ? "Yes" : "No" }}
            </td>
          </ng-container>

          <ng-container matColumnDef="updatedAt">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="updatedAt">Updated</th>
            <td mat-cell *matCellDef="let product">
              {{ product.updatedAt }}
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>

        <mat-paginator
          [length]="totalElements()"
          [pageIndex]="page()"
          [pageSize]="size()"
          [pageSizeOptions]="[5, 10, 25, 50]"
          (page)="onPageChange($event)"
        ></mat-paginator>
      }
    </section>
