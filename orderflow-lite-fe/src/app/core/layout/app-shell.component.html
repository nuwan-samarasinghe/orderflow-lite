<mat-toolbar color="primary">
      <button
        matIconButton
        (click)="toggleSidenav()"
        aria-label="Toggle navigation"
      >
        <mat-icon>menu</mat-icon>
      </button>
      <span>OrderFlow Lite</span>
      <span class="spacer"></span>
      <button mat-stroked-button type="button">Admin Demo</button>
    </mat-toolbar>

    <mat-sidenav-container class="shell-container">
      <mat-sidenav [opened]="opened()" mode="side" class="shell-nav">
        <mat-nav-list>
          <a
            mat-list-item
            routerLink="/admin/dashboard"
            routerLinkActive="active-link"
            >Dashboard</a
          >
          <a mat-list-item routerLink="/admin/products" routerLinkActive="active-link"
            >Products</a
          >
          <a mat-list-item routerLink="/admin/orders" routerLinkActive="active-link"
            >Orders</a
          >
          <a mat-list-item routerLink="/admin/customers" routerLinkActive="active-link"
            >Customers</a
          >
        </mat-nav-list>
      </mat-sidenav>
      <mat-sidenav-content>
        <main class="page-shell">
          <ng-content />
        </main>
      </mat-sidenav-content>
    </mat-sidenav-container>
